spring:
  datasource:
    url: jdbc:mysql://localhost:3306/mall?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${EASYGOING_DB_USERNAME:root}
    password: ${EASYGOING_DB_PASSWORD:root}
    druid:
      initial-size: 5 #连接池初始化大小
      min-idle: 10 #最小空闲连接数
      max-active: 20 #最大连接数
      web-stat-filter:
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*" #不统计这些请求数据
      stat-view-servlet: #访问监控网页的登录用户名和密码
        login-username: druid
        login-password: druid
  data:
    redis:
      host: ${EASYGOING_REDIS_HOST:localhost}
      port: ${EASYGOING_REDIS_PORT:6379}
      timeout: 800ms

jwt:
  # Local development only. Production must set EASYGOING_JWT_SECRET.
  secret: ${EASYGOING_JWT_SECRET:easygoing-local-development-secret-change-before-deployment}
