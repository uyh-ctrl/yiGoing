spring:
  profiles:
    active: dev
  ai:
    openai:
      base-url: ${EASYGOING_AI_BASE_URL:https://api.openai.com}
      api-key: ${EASYGOING_AI_API_KEY:not-configured}
      chat:
        options:
          model: ${EASYGOING_AI_CHAT_MODEL:}
      embedding:
        options:
          model: ${EASYGOING_AI_EMBEDDING_MODEL:}

mybatis:
  mapper-locations:
    - classpath:dao/*.xml
    - classpath*:com/**/mapper/*.xml

jwt:
  tokenHeader: Authorization
  # Mandatory in every deployed environment. Do not commit a JWT secret.
  secret: ${EASYGOING_JWT_SECRET}
  expiration: 604800
  tokenHead: Bearer

aliyun:
  oss:
    endpoint: ${EASYGOING_OSS_ENDPOINT:}
    accessKeyId: ${EASYGOING_OSS_ACCESS_KEY_ID:}
    accessKeySecret: ${EASYGOING_OSS_ACCESS_KEY_SECRET:}
    bucketName: ${EASYGOING_OSS_BUCKET:}
    policy:
      expire: 300
    maxSize: 10
    callback: http://localhost:8080/aliyun/oss/callback
    dir:
      prefix: mall/images/

logging:
  level:
    root: info
    com.macro.mall: debug

springdoc:
  swagger-ui:
    customCssUrl: /swagger-ui/mall-theme.css
    display-request-duration: true

easygoing:
  ai:
    enabled: ${EASYGOING_AI_ENABLED:false}
