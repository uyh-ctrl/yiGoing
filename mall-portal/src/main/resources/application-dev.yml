server:
  port: 8443
  ssl:
    key-store: keystore.p12
    key-alias: tomcat
    key-store-password: ${EASYGOING_TLS_KEYSTORE_PASSWORD:123456}
    key-store-type: PKCS12

spring:
  datasource:
    url: ${EASYGOING_PORTAL_DB_URL:jdbc:mysql://localhost:3306/mall?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${EASYGOING_PORTAL_DB_USERNAME:root}
    password: ${EASYGOING_PORTAL_DB_PASSWORD:root}
    druid:
      initial-size: 5
      min-idle: 10
      max-active: 20
      web-stat-filter:
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
      stat-view-servlet:
        login-username: ${EASYGOING_DRUID_USERNAME:druid}
        login-password: ${EASYGOING_DRUID_PASSWORD:druid}
  data:
    mongodb:
      uri: ${EASYGOING_MONGODB_URI:mongodb://localhost:27017/mall-port}
  redis:
    host: ${EASYGOING_PORTAL_REDIS_HOST:localhost}
    database: 0
    port: ${EASYGOING_PORTAL_REDIS_PORT:6379}
    password: ${EASYGOING_PORTAL_REDIS_PASSWORD:}
    jedis:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0
    timeout: 3000ms
  rabbitmq:
    host: ${EASYGOING_RABBITMQ_HOST:localhost}
    port: ${EASYGOING_RABBITMQ_PORT:5672}
    virtual-host: ${EASYGOING_RABBITMQ_VHOST:/mall}
    username: ${EASYGOING_RABBITMQ_USERNAME:mall}
    password: ${EASYGOING_RABBITMQ_PASSWORD:mall}
    publisher-confirms: true

logging:
  level:
    org.springframework.data.mongodb.core: debug
    com.macro.mall.mapper: debug
    com.macro.mall.portal.dao: debug

easygoing:
  payment:
    allow-manual-confirmation: ${EASYGOING_PAYMENT_ALLOW_MANUAL_CONFIRMATION:true}
